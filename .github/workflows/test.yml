name: Backend Tests

on:
  push:
    branches:
      - develop
      - main
      - 'codex/**'
  pull_request:
    branches:
      - develop
      - main

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: 5eyes-backend/requirements.txt

      - name: Install dependencies
        working-directory: 5eyes-backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        working-directory: 5eyes-backend
        run: |
          python -m pytest tests/ -v --tb=short --maxfail=5

      - name: Upload pytest log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: 5eyes-backend/.pytest_cache/
          retention-days: 7
